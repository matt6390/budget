<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
      :root {
        --bg: #f8fafc;
        --nav-bg: #0f172a;
        --card-bg: #ffffff;
        --input-bg: #ffffff;
        --primary: #4f46e5;
        --primary-light: #c7d2fe;
        --border: #e2e8f0;
        --border-input: #cbd5e1;
        --text: #0f172a;
        --muted: #64748b;
        --invert: #ffffff;
        --error: #dc2626;
        --error-light: #fca5a5;
        --success: #16a34a;
        --warning: #ea580c;
        --btn-secondary-bg: #ffffff;
        --shadow-card: 0 4px 20px rgba(15,23,42,0.07);
        --shadow-modal: 0 20px 60px rgba(15,23,42,0.2);
        --overlay-bg: rgba(15,23,42,0.5);
      }
      [data-theme="dark"] {
        --bg: #0f172a;
        --nav-bg: #020617;
        --card-bg: #1e293b;
        --input-bg: #0f172a;
        --primary: #818cf8;
        --primary-light: #3730a3;
        --border: #334155;
        --border-input: #475569;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --invert: #ffffff;
        --error: #f87171;
        --error-light: #7f1d1d;
        --success: #4ade80;
        --warning: #fb923c;
        --btn-secondary-bg: #1e293b;
        --shadow-card: 0 4px 20px rgba(0,0,0,0.3);
        --shadow-modal: 0 20px 60px rgba(0,0,0,0.5);
        --overlay-bg: rgba(0,0,0,0.6);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
